name: Release Embedded Extension

on:
    push:
        branches:
            - 'main'
        paths:
            - 'browsers/embedded/manifest.json'
    # workflow_dispatch for manual testing or debugging
    workflow_dispatch:

env:
    APPLE_EMBEDDED_PATH: SharedPackages/WebExtensions/Sources/WebExtensions/BundledWebExtensions/duckduckgo-embedded-web-extension.zip

jobs:
    release_embedded:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'

            - name: Read embedded version
              id: version
              run: |
                  VERSION=$(jq -r .version browsers/embedded/manifest.json)
                  echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

            - name: Install dependencies
              run: npm run install-ci

            - name: Build embedded extension
              run: npm run release-embedded

            - name: Locate embedded zip
              id: find-zip
              run: |
                  ZIP_PATH=$(ls build/embedded/release/embedded-release-*.zip)
                  echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_OUTPUT

            - name: Extract Autoconsent Apple PR metadata from the latest PR
              # this will populate APPLE_BRANCH and APPLE_TASK_GID in case of autoconsent-triggered release
              id: pr-metadata
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: node scripts/embedded-release-metadata.js

            - name: Checkout Apple monorepo
              uses: actions/checkout@v4
              with:
                  repository: duckduckgo/apple-browsers
                  path: apple-monorepo/
                  token: ${{ secrets.DAX_WEB_AUTOFILL_AUTOMATION }}

            - name: Prepare Apple target branch
              working-directory: apple-monorepo
              env:
                  BRANCH: ${{ steps.pr-metadata.outputs.APPLE_BRANCH }}
              run: |
                  git config user.name "Maxim Tsoy"
                  git config user.email "mtsoy@duckduckgo.com"
                  if [ "$BRANCH" = "update-autoconsent" ] && git fetch origin "$BRANCH" 2>/dev/null; then
                      # Autoconsent flow: the branch already has some changes from autoconsent automation
                      git checkout "$BRANCH"
                  else
                      # Non-autoconsent flow: always start fresh from main
                      git checkout -b "$BRANCH"
                  fi

            - name: Copy embedded zip to Apple repo
              run: |
                  cp "${{ steps.find-zip.outputs.ZIP_PATH }}" \
                     "apple-monorepo/${{ env.APPLE_EMBEDDED_PATH }}"

            # we don't use peter-evans/create-pull-request action here because we need to push a new commit to the existing PR
            - name: Commit and push to Apple target branch
              id: apple-commit-push
              working-directory: apple-monorepo
              env:
                  BRANCH: ${{ steps.pr-metadata.outputs.APPLE_BRANCH }}
              run: |
                  git add "${{ env.APPLE_EMBEDDED_PATH }}"
                  if git diff --cached --quiet; then
                      echo "No changes to commit"
                      echo "PUSHED=false" >> $GITHUB_OUTPUT
                  else
                      git commit -m "Update embedded extension to ${{ steps.version.outputs.VERSION }}"
                      # force push to the target branch to avoid conflicts with the existing PR (we want to overwrite)
                      git push --force-with-lease -u origin "$BRANCH"
                      echo "PUSHED=true" >> $GITHUB_OUTPUT
                  fi

            - name: Find or create Apple PR
              id: find-apple-pr
              if: steps.apple-commit-push.outputs.PUSHED == 'true'
              working-directory: apple-monorepo
              env:
                  GH_TOKEN: ${{ secrets.DAX_WEB_AUTOFILL_AUTOMATION }}
                  BRANCH: ${{ steps.pr-metadata.outputs.APPLE_BRANCH }}
              run: |
                  PR_URL=$(gh pr view "$BRANCH" --json url --jq .url 2>/dev/null || true)
                  if [ -n "$PR_URL" ]; then
                      echo "PULL_REQUEST_URL=$PR_URL" >> $GITHUB_OUTPUT
                      exit 0
                  fi

                  # For the autoconsent flow, the PR must already exist (created by ddg-release.yml)
                  if [ "$BRANCH" = "update-autoconsent" ]; then
                      echo "::error::Expected PR on update-autoconsent branch but none found"
                      exit 1
                  fi

                  # Non-autoconsent flow: create a new PR
                  TITLE="Update embedded extension to ${{ steps.version.outputs.VERSION }}"
                  COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
                  BODY=$(printf 'Updates the embedded web extension to version %s.\n\nTriggered by: [%s](%s)' \
                      "${{ steps.version.outputs.VERSION }}" "$TITLE" "$COMMIT_URL")
                  PR_URL=$(gh pr create --base main --head "$BRANCH" \
                      --title "$TITLE" \
                      --body "$BODY")
                  echo "PULL_REQUEST_URL=$PR_URL" >> $GITHUB_OUTPUT

            - name: Mark Apple PR as ready
              if: steps.find-apple-pr.outputs.PULL_REQUEST_URL
              working-directory: apple-monorepo
              env:
                  GH_TOKEN: ${{ secrets.DAX_WEB_AUTOFILL_AUTOMATION }}
                  BRANCH: ${{ steps.pr-metadata.outputs.APPLE_BRANCH }}
              run: gh pr ready "$BRANCH" || true

            - name: Update Apple Asana subtask for the Autoconsent flow
              if: steps.find-apple-pr.outputs.PULL_REQUEST_URL && steps.pr-metadata.outputs.APPLE_TASK_GID
              env:
                  ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
                  APPLE_PR_URL: ${{ steps.find-apple-pr.outputs.PULL_REQUEST_URL }}
                  APPLE_TASK_GID: ${{ steps.pr-metadata.outputs.APPLE_TASK_GID }}
              run: node scripts/embedded-release-update-asana.js
